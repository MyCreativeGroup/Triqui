<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #8B4513; /* Marrón */
            --mic-inactive: #A52A2A; /* Rojo */
            --mic-active: #28a745;   /* Verde */
            --bg-color: #EFEBE9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        /* --- PANTALLA DE INICIO --- */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            margin: 20px 0;
        }

        .user-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-user {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --- PANTALLA DE APLICACIÓN --- */
        #app-screen {
            display: none;
            padding: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Botones en una sola fila con scroll horizontal */
        .header-actions {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .btn-add { background-color: #5D4037; }
        .btn-save { background-color: var(--primary-color); }
        .btn-clear { background-color: #A52A2A; }
        .btn-back { background-color: #6D4C41; }

        /* TABLA */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        
        th {
            background-color: #D7CCC8;
            border: 1px solid #BCAAA4;
            padding: 10px;
            text-align: center;
        }

        td { border: 1px solid #dee2e6; padding: 8px; }

        /* Columnas */
        .col-qty { width: 80px; text-align: center; }
        .col-check { width: 60px; text-align: center; }
        .col-price, .col-total { width: 120px; text-align: right; }

        /* Input de cantidad optimizado para Android/PC */
        .qty-input {
            width: 70px;
            text-align: center;
            padding: 5px;
            font-size: 16px; /* Evita zoom automático en iOS/Android */
        }

        .name-input {
            width: 100%;
            border: 1px solid #ccc;
            padding: 5px;
            font-weight: bold;
        }

        .item-inactive { color: #999 !important; font-weight: normal !important; }

        .dictate-btn {
            background: none;
            border: none;
            color: var(--mic-inactive);
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0 8px;
            transition: color 0.2s;
        }

        .dictate-btn.recording { color: var(--mic-active) !important; }

        .total-bar {
            margin-top: 20px;
            font-size: 1.2rem;
            text-align: right;
            padding: 15px;
            background: #EFEBE9;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="color: var(--primary-color);">Mi Lista</h1>
        <img src="https://www.tukanopublicidad.com/Folder/Carrito-01.png" alt="Carrito" class="welcome-img">
        <h3>Selecciona Un Usuario</h3>
        <div class="user-grid">
            <button class="btn-user" onclick="startApp('nanos', 'Ñaños')">Ñaños</button>
            <button class="btn-user" onclick="startApp('pato', 'Pato')">Pato</button>
            <button class="btn-user" onclick="startApp('pipe', 'Pipe')">Pipe</button>
            <button class="btn-user" onclick="startApp('lila', 'Lila')">Lila</button>
            <button class="btn-user" onclick="startApp('invitado1', 'Invitado 1')">Invitado 1</button>
            <button class="btn-user" onclick="startApp('invitado2', 'Invitado 2')">Invitado 2</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="container">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                <h2 id="current-user-title" style="color: var(--primary-color);">Lista de</h2>
                <button class="btn btn-back" onclick="location.reload()"><i class="fas fa-arrow-left"></i> Volver</button>
            </div>
            
            <div class="header-actions">
                <input type="text" id="new-item-name" style="padding:10px; border-radius:5px; border:1px solid #ccc; flex-grow:1;" placeholder="Producto nuevo...">
                <button class="btn btn-add" onclick="addNewRow()"><i class="fas fa-plus"></i> Agregar</button>
                <button class="btn btn-save" onclick="saveData()"><i class="fas fa-save"></i> Guardar</button>
                <button class="btn btn-clear" onclick="clearAll()"><i class="fas fa-trash"></i> Borrar</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="col-qty">#</th>
                            <th>Producto</th>
                            <th class="col-check"><i class="fas fa-check-circle"></i></th>
                            <th class="col-price">Precio ($)</th>
                            <th class="col-total">Total</th>
                            <th style="width: 40px;"><i class="fas fa-times"></i></th>
                        </tr>
                    </thead>
                    <tbody id="task-list"></tbody>
                </table>
            </div>

            <div class="total-bar">
                Total A Pagar: <span id="grand-total">$ 0</span>
            </div>
        </div>
    </div>

<script>
    let currentUser = "";
    const taskList = document.getElementById('task-list');
    const formatter = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    function startApp(id, label) {
        currentUser = id;
        document.getElementById('current-user-title').innerText = "Lista de " + label;
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        loadData();
    }

    function createRow(qty = 1, name = "", checked = true, price = 0) {
        const row = document.createElement('tr');
        const total = qty * price;

        row.innerHTML = `
            <td class="col-qty"><input type="number" class="qty-input" value="${qty}" min="1"></td>
            <td>
                <div style="display:flex; align-items:center;">
                    <input type="text" class="name-input ${!checked && name ? 'item-inactive' : ''}" value="${name}">
                    <button class="dictate-btn"><i class="fas fa-microphone"></i></button>
                </div>
            </td>
            <td class="col-check"><input type="checkbox" class="row-check" ${checked ? 'checked' : ''} style="transform: scale(1.3);"></td>
            <td><input type="text" class="price-input" style="width:100%; text-align:right;" value="${price.toLocaleString('es-CO')}"></td>
            <td class="col-total row-total-val" style="text-align:right; font-weight:bold;">${formatter.format(total)}</td>
            <td style="text-align:center;"><button style="background:none; border:none; color:#A52A2A; cursor:pointer;" onclick="this.closest('tr').remove(); updateGrandTotal();"><i class="fas fa-trash-alt"></i></button></td>
        `;

        const qInput = row.querySelector('.qty-input');
        const pInput = row.querySelector('.price-input');
        const tCell = row.querySelector('.row-total-val');
        const micBtn = row.querySelector('.dictate-btn');
        const nInput = row.querySelector('.name-input');
        const cInput = row.querySelector('.row-check');

        const recalc = () => {
            const q = parseInt(qInput.value) || 0;
            const p = parseFloat(pInput.value.replace(/[^\d]/g, "")) || 0;
            tCell.innerText = formatter.format(q * p);
            updateGrandTotal();
        };

        pInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^\d]/g, "");
            e.target.value = val ? parseInt(val).toLocaleString('es-CO') : "";
            recalc();
        });

        qInput.addEventListener('input', recalc);
        cInput.addEventListener('change', () => nInput.classList.toggle('item-inactive', !cInput.checked));

        micBtn.onclick = () => {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return alert("Micrófono no soportado");
            
            const rec = new Speech();
            rec.lang = 'es-CO';
            
            rec.onstart = () => micBtn.classList.add('recording');
            rec.onend = () => micBtn.classList.remove('recording');
            
            rec.onresult = (e) => {
                nInput.value = e.results[0][0].transcript;
                cInput.checked = true;
                nInput.classList.remove('item-inactive');
            };
            rec.start();
        };

        return row;
    }

    function addNewRow() {
        const input = document.getElementById('new-item-name');
        if(!input.value.trim()) return;
        taskList.insertBefore(createRow(1, input.value, true, 0), taskList.firstChild);
        input.value = "";
        updateGrandTotal();
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('#task-list tr').forEach(row => {
            const q = parseInt(row.querySelector('.qty-input').value) || 0;
            const p = parseFloat(row.querySelector('.price-input').value.replace(/[^\d]/g, "")) || 0;
            total += (q * p);
        });
        document.getElementById('grand-total').innerText = formatter.format(total);
    }

    async function saveData() {
        const items = [];
        document.querySelectorAll('#task-list tr').forEach(row => {
            const n = row.querySelector('.name-input').value.trim();
            if(n) items.push({
                q: row.querySelector('.qty-input').value,
                n: n,
                c: row.querySelector('.row-check').checked,
                p: parseFloat(row.querySelector('.price-input').value.replace(/[^\d]/g, "")) || 0
            });
        });
        await fetch('save_data_multi.php', { method: 'POST', body: JSON.stringify({ user: currentUser, items: items }) });
        alert("Guardado");
    }

    async function loadData() {
        const res = await fetch(`load_data_multi.php?user=${currentUser}`);
        const data = await res.json();
        taskList.innerHTML = "";
        if(data.items && data.items.length > 0) {
            data.items.forEach(i => taskList.appendChild(createRow(i.q, i.n, i.c, i.p)));
        } else {
            for(let i=0; i<8; i++) taskList.appendChild(createRow(1, "", false, 0));
        }
        updateGrandTotal();
    }

    function clearAll() {
        if(confirm("¿Borrar todo?")) {
            taskList.innerHTML = "";
            for(let i=0; i<8; i++) taskList.appendChild(createRow(1, "", false, 0));
            updateGrandTotal();
        }
    }
</script>
</body>
</html>
