<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Triqui🎉</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Poppins', sans-serif;
    background: #000000; /* Fondo cambiado a negro */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: #fff;
  }

  /* ===== Pantalla Principal ===== */
  #pantalla-inicio {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); /* Fondo oscuro transparente */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    z-index: 10;
  }

  #pantalla-inicio h1 {
    font-size: 3em;
    color: #FFD166;
    text-shadow: 3px 3px #EF476F;
    margin-bottom: 20px;
  }

  #configuracion {
    background: rgba(30, 30, 30, 0.95); /* Contenedor oscuro para combinar con el fondo */
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(255,255,255,0.1);
    width: 90%;
    max-width: 500px;
    color: #fff;
  }

  select, button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 1.1em;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background-color: #118AB2;
    color: white;
    transition: all 0.3s;
  }

  button:hover {
    background-color: #06D6A0;
    transform: scale(1.05);
  }

  .imagenes-jugadores {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
    max-height: 200px;
    overflow-y: auto; /* Scroll si hay muchos familiares */
    padding: 5px;
  }

  .jugador {
    text-align: center;
    width: 28%;
  }

  .jugador img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 15px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .jugador img:hover { transform: scale(1.08); }
  .jugador img.seleccionada-X { border-color: gold; }
  .jugador img.seleccionada-O { border-color: deepskyblue; }

  .jugador p {
    margin-top: 5px;
    font-weight: bold;
    color: #FFD166;
    font-size: 0.9em;
  }

  /* ===== Juego ===== */
  #juego {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 15px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.4em;
    margin-bottom: 15px;
    background-color: #FFD166;
    padding: 10px 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    color: #073B4C;
  }

  header img {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    border: 2px solid #073B4C;
    object-fit: cover;
  }

  /* El tablero calcula dinámicamente su tamaño basado en el lado más corto de la pantalla (vmin) */
  #tablero {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 85vmin; 
    max-height: 85vmin;
    background-color: #FFD166;
    border: 6px solid #073B4C;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  }

  .celda {
    border: 2px solid #F4978E;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: #FFE9C6;
    transition: background 0.3s;
  }

  .celda:hover { background-color: #F8CBA6; }

  .celda img {
    width: 85%;
    height: 85%;
    object-fit: cover; /* Mantiene la proporción de las fotos dentro de la celda */
    border-radius: 10px;
    opacity: 0;
    animation: aparecer 0.4s forwards;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  footer {
    margin-top: 15px;
    display: flex;
    gap: 15px;
  }

  footer button {
    background: #EF476F;
    color: white;
    padding: 10px 20px;
    border-radius: 15px;
  }

  footer button:hover { background-color: #06D6A0; }

  /* ===== Mensaje Final ===== */
  #mensaje-final {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    z-index: 20;
  }

  #mensaje-final h2 {
    font-size: 2.5em;
    margin-bottom: 15px;
    text-shadow: 3px 3px #EF476F;
  }

  #mensaje-final .imagenes-finales {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  #mensaje-final .imagenes-finales img {
    width: 100px; height: 100px;
    border-radius: 15px;
    border: 3px solid white;
    object-fit: cover;
  }

  /* ===== Confeti ===== */
  .confeti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: caer 3s linear forwards;
    z-index: 1000;
  }

  @keyframes caer {
    to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ===== Responsividad Adicional ===== */
  @media (max-width: 480px) {
    #pantalla-inicio h1 { font-size: 2em; }
    header { font-size: 1.1em; padding: 8px 15px; }
    header img { width: 35px; height: 35px; }
    #tablero { max-width: 90vw; max-height: 90vw; } /* Prioridad total al ancho en móviles pequeños */
  }
</style>
</head>
<body>

<div id="pantalla-inicio">
  <h1>🎯 TRIQUI FAMILIAR 🎯</h1>
  <div id="configuracion">
    <label style="display:block; margin-bottom:10px;">¿Cómo quieres jugar?</label>
    <select id="modo">
      <option value="solo">Solito</option>
      <option value="humano">En familia</option>
    </select>
    <div id="imagenes-humano" class="imagenes-jugadores"></div>
    <div style="margin-top: 15px;">
      <button id="btn-musica">🔊 Música ON/OFF</button>
      <button id="btn-iniciar">🚀 Iniciar Juego</button>
    </div>
  </div>
</div>

<div id="juego">
  <header id="turno">
    <img id="foto-turno" src="" alt="">
    <span id="texto-turno">Le toca a: Jugador 1</span>
  </header>
  <div id="tablero"></div>
  <footer>
    <button id="btn-reiniciar">🔁 Reiniciar</button>
    <button id="btn-menu">🏠 Menú</button>
  </footer>
</div>

<div id="mensaje-final">
  <h2 id="titulo-final"></h2>
  <div class="imagenes-finales" id="imagenes-finales"></div>
  <button id="btn-reiniciar-final">🔁 Jugar de nuevo</button>
  <button id="btn-menu-final">🏠 Volver al menú</button>
</div>

<audio id="musica" src="music.mp3" loop></audio>
<audio id="sonido-jugada" src="click.mp3"></audio>
<audio id="sonido-victoria" src="victory.mp3"></audio>
<audio id="sonido-confeti" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6dcfa2f2f2.mp3?filename=party-horn-112941.mp3"></audio>

<script>
  const pantallaInicio=document.getElementById('pantalla-inicio');
  const juego=document.getElementById('juego');
  const tablero=document.getElementById('tablero');
  const modo=document.getElementById('modo');
  const btnIniciar=document.getElementById('btn-iniciar');
  const btnMusica=document.getElementById('btn-musica');
  const musica=document.getElementById('musica');
  const sonidoJugada=document.getElementById('sonido-jugada');
  const sonidoVictoria=document.getElementById('sonido-victoria');
  const sonidoConfeti=document.getElementById('sonido-confeti');
  const turnoTexto=document.getElementById('texto-turno');
  const fotoTurno=document.getElementById('foto-turno');
  const imagenesHumano=document.getElementById('imagenes-humano');
  const mensajeFinal=document.getElementById('mensaje-final');
  const tituloFinal=document.getElementById('titulo-final');
  const imagenesFinales=document.getElementById('imagenes-finales');
  const btnMenu=document.getElementById('btn-menu');
  const btnMenuFinal=document.getElementById('btn-menu-final');
  const btnReiniciar=document.getElementById('btn-reiniciar');
  const btnReiniciarFinal=document.getElementById('btn-reiniciar-final');

  let turno='X';
  let celdas=["","","","","","","","",""];
  let imagenesJugadores={X:null,O:null};
  let nombresJugadores={X:"Jugador 1",O:"Jugador 2"};
  let contraMaquina=true;

  // URL base solicitada para el repositorio
  const baseUrl = "https://mycreativegroup.github.io/Triqui/";

  const jugadores = [
    {nombre:"Tío",img:"https://www.tukanopublicidad.com/Folder/El tio.png"},
    {nombre:"Chompi",img:"https://www.tukanopublicidad.com/Folder/Chompi.png"},
    {nombre:"Pato",img:"https://www.tukanopublicidad.com/Folder/Pato.png"},
    {nombre:"Juanis",img:"https://www.tukanopublicidad.com/Folder/Juanis.png"},
    {nombre:"Lila",img:"https://www.tukanopublicidad.com/Folder/Lila.png"},
    {nombre:"Pipe",img:"https://www.tukanopublicidad.com/Folder/Pipe.png"},
    {nombre:"Tutis",img:"https://www.tukanopublicidad.com/Folder/Tutis.png"},
    {nombre:"Emilito",img:"https://www.tukanopublicidad.com/Folder/Emilito.png"},
    {nombre:"Ñaños",img:"https://www.tukanopublicidad.com/Folder/Nanos.png"}
  ];

  jugadores.forEach(j=>{
    const div=document.createElement('div');
    div.classList.add('jugador');
    const img=document.createElement('img');
    img.src=j.img;
    img.alt=j.nombre;
    const p=document.createElement('p');
    p.textContent=j.nombre;

    img.addEventListener('click',()=>{
      if(!imagenesJugadores.X){
        imagenesJugadores.X=j.img;
        nombresJugadores.X=j.nombre;
        img.classList.add('seleccionada-X');
      }else if(!imagenesJugadores.O && j.img!==imagenesJugadores.X){
        imagenesJugadores.O=j.img;
        nombresJugadores.O=j.nombre;
        img.classList.add('seleccionada-O');
      }else if(img.classList.contains('seleccionada-X')){
        imagenesJugadores.X=null;
        nombresJugadores.X="Jugador 1";
        img.classList.remove('seleccionada-X');
      }else if(img.classList.contains('seleccionada-O')){
        imagenesJugadores.O=null;
        nombresJugadores.O="Jugador 2";
        img.classList.remove('seleccionada-O');
      }
    });

    div.appendChild(img); div.appendChild(p);
    imagenesHumano.appendChild(div);
  });

  modo.addEventListener('change',()=>{
    if(modo.value==="humano"){ imagenesHumano.style.display="flex"; contraMaquina=false; }
    else { imagenesHumano.style.display="none"; contraMaquina=true; }
  });

  btnMusica.addEventListener('click',()=>{
    musica.paused ? musica.play() : musica.pause();
  });

  btnIniciar.addEventListener('click',()=>{
    if(!contraMaquina && (!imagenesJugadores.X||!imagenesJugadores.O)){
      alert("Selecciona las imágenes de los dos jugadores antes de comenzar.");return;
    }
    pantallaInicio.style.display='none';
    juego.style.display='flex';
    iniciarJuego();
  });

  function iniciarJuego(){
    mensajeFinal.style.display='none';
    tablero.innerHTML='';
    celdas=["","","","","","","","",""];
    turno='X';
    if(contraMaquina){
      // Rutas actualizadas con la URL de tu GitHub Pages
      imagenesJugadores={X: baseUrl + 'yo.jpg', O: baseUrl + 'circulo.png'};
      nombresJugadores={X:'Yo',O:'La Máquina'};
    }
    actualizarTurno();
    for(let i=0;i<9;i++){
      const celda=document.createElement('div');
      celda.classList.add('celda');
      celda.addEventListener('click',()=>jugar(i));
      tablero.appendChild(celda);
    }
  }

  function actualizarTurno(){
    turnoTexto.textContent=`Le toca a: ${nombresJugadores[turno]}`;
    fotoTurno.src=imagenesJugadores[turno];
  }

  function jugar(i){
    if(celdas[i]!=="")return;
    celdas[i]=turno;
    const celda=tablero.children[i];
    const img=document.createElement('img');
    img.src=imagenesJugadores[turno];
    celda.appendChild(img);
    sonidoJugada.play();

    if(verificarGanador()){setTimeout(()=>mostrarMensajeFinal(turno,false),300);return;}
    if(celdas.every(c=>c!=="")){setTimeout(()=>mostrarMensajeFinal(null,true),300);return;}
    turno=(turno==='X')?'O':'X';
    actualizarTurno();
    if(contraMaquina && turno==='O') setTimeout(jugadaMaquina,500);
  }

  function jugadaMaquina(){
    const vacias=celdas.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    const movimiento=vacias[Math.floor(Math.random()*vacias.length)];
    jugar(movimiento);
  }

  function verificarGanador(){
    const combos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return combos.some(([a,b,c])=>celdas[a]&&celdas[a]===celdas[b]&&celdas[a]===celdas[c]);
  }

  function mostrarMensajeFinal(ganador,empate){
    mensajeFinal.style.display='flex';
    imagenesFinales.innerHTML='';
    if(empate){
      tituloFinal.textContent='¡Empate! 😅';
      imagenesFinales.innerHTML=`<img src="${imagenesJugadores.X}"><img src="${imagenesJugadores.O}">`;
    }else{
      tituloFinal.textContent=`🏆 ¡${nombresJugadores[ganador]} ganó!`;
      imagenesFinales.innerHTML=`<img src="${imagenesJugadores[ganador]}">`;
      sonidoVictoria.play();
      sonidoConfeti.play();
      lanzarConfeti();
    }
  }

  function lanzarConfeti(){
    for(let i=0;i<100;i++){
      const confeti=document.createElement('div');
      confeti.classList.add('confeti');
      confeti.style.left=Math.random()*100+"vw";
      confeti.style.backgroundColor=`hsl(${Math.random()*360},100%,60%)`;
      confeti.style.animationDuration=(2+Math.random()*3)+"s";
      confeti.style.width=confeti.style.height=(5+Math.random()*10)+"px";
      document.body.appendChild(confeti);
      setTimeout(()=>confeti.remove(),4000);
    }
  }

  btnReiniciar.addEventListener('click',iniciarJuego);
  btnReiniciarFinal.addEventListener('click',iniciarJuego);
  btnMenu.addEventListener('click',()=>volverMenu());
  btnMenuFinal.addEventListener('click',()=>volverMenu());

  function volverMenu(){
    mensajeFinal.style.display='none';
    juego.style.display='none';
    pantallaInicio.style.display='flex';
  }
</script>
</body>
</html>
